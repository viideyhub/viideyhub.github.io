<style>
body{
margin:0;
background:black;
color:white;
text-align:center;
font-family:Arial;
}

#loader{
display:none;
margin-top:30px;
}

.bar{
width:80%;
height:10px;
background:#333;
margin:20px auto;
border-radius:10px;
overflow:hidden;
}

.progress{
height:100%;
width:0%;
background:lime;
}
</style>

</head>

<body>

<h2>🔥 Video Viral Terbaru</h2>

<button onclick="startPlay()" style="padding:15px 25px;font-size:18px;margin-top:30px;">
▶️ Play Video
</button>

<div id="loader">
<p>⏳ Memuat video, harap tunggu...</p>

<div class="bar">
<div class="progress" id="progress"></div>
</div>

<p id="percent">0%</p>
</div>

<script>
function startPlay(){

// tampilkan loader
document.getElementById("loader").style.display = "block";

let p = 0;
let interval = setInterval(function(){
    p += Math.random()*15;

    if(p >= 100){
        p = 100;
        clearInterval(interval);

        setTimeout(function(){
            window.location.href = "play.html";
        }, 500);
    }

    document.getElementById("progress").style.width = p + "%";
    document.getElementById("percent").innerText = Math.floor(p) + "%";

}, 400);

}
</script>

</body>
