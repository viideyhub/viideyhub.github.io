<button onclick="startPlay()" style="padding:15px 25px;font-size:18px;">
▶️ Play Video
</button>

<p id="loading" style="display:none;margin-top:20px;">Memuat video...</p>

<script>
function startPlay(){
    // tampilkan loading
    document.getElementById("loading").style.display = "block";

    // delay biar natural
    setTimeout(function(){
        window.location.href = "play.html";
    }, 2500);
}
</script>
