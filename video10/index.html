<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Viral</title>

<!-- POPUNDER -->
<script>
(function(s){
    s.dataset.zone='10879872',
    s.src='https://al5sm.com/tag.min.js'
})
([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))
</script>

<style>
body { margin:0; background:#000; font-family:Arial; color:#fff; overflow:hidden; }

/* LOADING */
#loading {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
    z-index:9999;
}

/* HEADER */
.header { position:absolute; top:15px; left:15px; display:flex; align-items:center; z-index:10;}
.avatar { width:45px; height:45px; border-radius:50%; background:url('https://i.pravatar.cc/100') center/cover; margin-right:10px; }
.follow { background:#ff2e63; padding:5px 10px; border-radius:20px; margin-left:10px; font-size:12px; }

/* VIEWER */
.viewer {
    position:absolute; top:70px; left:15px;
    background:rgba(0,0,0,0.6);
    padding:5px 10px; border-radius:15px;
    font-size:13px;
    z-index:10;
}

/* VIDEO */
.video-container { height:100vh; position:relative; }
video { width:100%; height:100%; object-fit:cover; }

/* RIGHT STACK */
.right-stack {
    position: fixed;
    right: 15px;
    bottom: 140px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
}

.like-box {
    font-size: 16px;
    animation: pulseLike 2s infinite;
}
@keyframes pulseLike {
    0% {transform:scale(1);}
    50% {transform:scale(1.1);}
    100% {transform:scale(1);}
}

/* TELEGRAM */
.telegram-box {
    display:flex;
    flex-direction:column;
    align-items:center;
    cursor:pointer;
}
.telegram-icon {
    width:60px;
    height:60px;
    background:#0088cc;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    box-shadow:0 0 20px rgba(0,136,204,0.8);
}
.telegram-icon img {
    width:30px;
    filter:brightness(0) invert(1);
}
.telegram-text { font-size:13px; margin-top:5px; }

/* NEXT BUTTON */
.next-btn {
    position:fixed;
    bottom:70px;
    right:15px;
    background:#ff2e63;
    padding:10px 15px;
    border-radius:20px;
    color:#fff;
    text-decoration:none;
}

/* COMMENTS */
.live-comments {
    position:fixed;
    bottom:120px;
    left:10px;
    width:70%;
}
.live-item {
    display:flex;
    margin-bottom:8px;
    animation:fadeUp 4s forwards;
}
.live-circle {
    width:28px;
    height:28px;
    border-radius:50%;
    margin-right:8px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:bold;
}
.live-text {
    background:rgba(0,0,0,0.6);
    padding:6px 10px;
    border-radius:15px;
}
@keyframes fadeUp {
    0%{opacity:0; transform:translateY(20px);}
    20%{opacity:1;}
    100%{opacity:0; transform:translateY(-10px);}
}

.comment-box {
    position:fixed;
    bottom:15px;
    left:10px;
    right:10px;
    background:#111;
    border-radius:25px;
    padding:10px;
    color:#888;
}
</style>
</head>

<body>

<div id="loading">Loading video...</div>

<div class="header">
    <div class="avatar"></div>
    <div>
        <div><b>Dinda Utami</b></div>
        <div style="font-size:12px;">155K Pengikut</div>
    </div>
    <div class="follow">Ikuti</div>
</div>

<div class="viewer">🔥 <span id="viewerCount">12.3K</span> watching</div>

<div class="video-container" onclick="triggerAds()">
    <video id="vid" muted playsinline loop>
        <source src="https://cdn2.videy.co/HLWpqAOZ1.mp4" type="video/mp4">
    </video>
</div>

<!-- RIGHT -->
<div class="right-stack">
    <div class="like-box">❤️ <span id="likeCount">316</span></div>

    <div class="telegram-box" onclick="goTelegram()">
        <div class="telegram-icon">
            <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg">
        </div>
        <div class="telegram-text">Telegram</div>
    </div>
</div>

<a href="/video2" class="next-btn">Next ▶</a>

<div class="live-comments" id="liveComments"></div>
<div class="comment-box">Write a comment...</div>

<script>
let vid=document.getElementById("vid");

/* LOADING DELAY */
setTimeout(()=>{
    document.getElementById("loading").style.display="none";
    vid.play();
},2000);

/* ANTI PAUSE */
vid.addEventListener('pause', ()=>{ vid.play(); });

/* ADS LOGIC */
let click=0,lastClick=0;
function triggerAds(){
    let now=Date.now();
    if(now-lastClick<1000)return;
    lastClick=now;
    click++;

    if(click===2){
        setTimeout(()=>{
            window.open("https://omg10.com/4/10888070","_blank");
        },3000);
    }
}

/* TELEGRAM */
function goTelegram(){
    triggerAds();
    setTimeout(()=>{
        window.open("https://t.me/viralterkini","_blank");
    },1500);
}

/* VIEWER */
let viewer=12300;
setInterval(()=>{
    viewer+=Math.floor(Math.random()*20)-10;
    document.getElementById("viewerCount").innerText=(viewer/1000).toFixed(1)+"K";
},2000);

/* LIKE */
let like=316;
setInterval(()=>{
    like+=Math.floor(Math.random()*5)+1;
    document.getElementById("likeCount").innerText=like;
},1500);

/* LIVE COMMENT */
const chatFlow=["ini live ya?","rame banget 😳","aku baru masuk","gas join 🔥","beneran ada 😳"];
const names=["Budi","Andi","Rina","Dewi","Fajar"];
let index=0;

function addLive(){
    let item=document.createElement("div");
    item.className="live-item";

    let circle=document.createElement("div");
    circle.className="live-circle";
    circle.style.background="#ff2e63";
    let name=names[Math.floor(Math.random()*names.length)];
    circle.innerText=name[0];

    let text=document.createElement("div");
    text.className="live-text";
    text.innerText=name+": "+chatFlow[index];

    index=(index+1)%chatFlow.length;

    item.appendChild(circle);
    item.appendChild(text);
    document.getElementById("liveComments").appendChild(item);

    setTimeout(()=>item.remove(),4000);
}

setInterval(addLive,1500);
</script>

</body>
</html>
