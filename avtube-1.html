<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ViideyHub Video</title>

<style>
body{
  margin:0;
  background:#000;
  font-family:Arial;
  color:#fff;
}

header{
  text-align:center;
  padding:10px;
  font-weight:bold;
}

video{
  width:100%;
  height:70vh;
  object-fit:cover;
  background:#000;
}

.info{
  text-align:center;
  font-size:13px;
  opacity:0.8;
  padding:8px;
}

.btn{
  background:#fff;
  color:#000;
  padding:12px;
  margin:10px;
  text-align:center;
  font-weight:bold;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>ViideyHub</header>

<video id="player" controls></video>

<div class="info">Enjoy Video</div>

<div class="btn" onclick="next()">NEXT VIDEO</div>

<script>
// =====================
// VIDEO LINK
// =====================
document.getElementById("player").src =
"https://cdn.videy.co/Is6iuGSX1.mp4";

// =====================
// 🔥 SAFE DIRECTLINK ADS
// =====================
let adShown = false;
let engaged = false;
let start = Date.now();

const adLink = "https://omg10.com/4/10908814";

// detect user interaction
document.addEventListener("click", () => engaged = true);
player.addEventListener("play", () => engaged = true);

// trigger halus
function tryAd(){
  if(adShown) return;

  let now = Date.now();
  let time = now - start;

  if(engaged && time > 12000){
    adShown = true;

    setTimeout(()=>{
      window.open(adLink, "_blank");
    }, 2000);
  }
}

document.addEventListener("click", tryAd);

// NEXT (natural moment)
function next(){
  if(!adShown){
    adShown = true;
    window.open(adLink, "_blank");
  }

  window.location.href = "video-2.html";
}
</script>

</body>
  </html>
