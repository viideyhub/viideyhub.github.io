<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Live Sekarang 🔴</title>

<!-- META -->
<meta name="description" content="Live sedang berlangsung, banyak yang lagi nonton sekarang.">
<meta property="og:title" content="Live Sekarang 🔴">
<meta property="og:description" content="Lagi ramai banget, masuk sekarang!">
<meta property="og:image" content="https://via.placeholder.com/500x300.jpg">
<meta property="og:url" content="https://viideyhub.my.id/video1.html">

<style>
body {
    margin:0;
    background:#000;
    font-family:Arial;
    color:#fff;
}

/* VIDEO FULL */
.video-container {
    position:relative;
    height:100vh;
}
video {
    width:100%;
    height:100%;
    object-fit:cover;
}

/* TOP BAR */
.top-bar {
    position:absolute;
    top:10px;
    left:10px;
    display:flex;
    align-items:center;
    gap:10px;
}

.live-badge {
    background:red;
    padding:3px 8px;
    border-radius:5px;
    font-size:12px;
}

.viewer {
    background:rgba(0,0,0,0.6);
    padding:3px 8px;
    border-radius:10px;
    font-size:12px;
}

/* RIGHT ICON */
.right {
    position:absolute;
    right:10px;
    bottom:100px;
    display:flex;
    flex-direction:column;
    gap:15px;
    align-items:center;
}

.icon {
    font-size:22px;
}

/* CTA */
.cta {
    position:absolute;
    bottom:80px;
    left:10px;
    right:10px;
    background:#ff2e63;
    padding:12px;
    border-radius:25px;
    text-align:center;
    font-weight:bold;
}

/* COMMENTS */
.comments {
    position:absolute;
    bottom:130px;
    left:10px;
    width:70%;
    font-size:13px;
}

.comment {
    margin-bottom:5px;
    background:rgba(0,0,0,0.5);
    padding:5px 10px;
    border-radius:10px;
}

/* INPUT */
.input {
    position:absolute;
    bottom:20px;
    left:10px;
    right:10px;
    background:#111;
    padding:10px;
    border-radius:20px;
    color:#aaa;
}
</style>
</head>

<body>

<div class="video-container">

<video autoplay muted loop playsinline>
    <source src="https://cdn2.videy.co/YLewbw831.mp4" type="video/mp4">
</video>

<!-- TOP -->
<div class="top-bar">
    <div class="live-badge">LIVE</div>
    <div class="viewer">🔥 <span id="viewer">12.3K</span></div>
</div>

<!-- RIGHT -->
<div class="right">
    <div class="icon">❤️</div>
    <div class="icon">💬</div>
    <div class="icon" onclick="goLink()">🔗</div>
</div>

<!-- CTA -->
<div class="cta" onclick="goLink()">
👉 Gabung Sekarang
</div>

<!-- COMMENTS -->
<div class="comments" id="comments"></div>

<!-- INPUT -->
<div class="input">Tulis komentar...</div>

</div>

<script>
function goLink(){
    window.open("https://omg10.com/4/10888070", "_blank");
}

/* VIEWER */
let v=12300;
setInterval(()=>{
    v+=Math.floor(Math.random()*20)-10;
    document.getElementById("viewer").innerText=(v/1000).toFixed(1)+"K";
},2000);

/* COMMENTS */
const chat=[
"ini beneran live?",
"rame banget 😳",
"baru join",
"serius ini?",
"gas gas 🔥"
];

function addComment(){
    let c=document.createElement("div");
    c.className="comment";
    c.innerText=chat[Math.floor(Math.random()*chat.length)];
    document.getElementById("comments").appendChild(c);

    setTimeout(()=>c.remove(),4000);
}

setInterval(addComment,1500);
</script>

</body>
</html>
