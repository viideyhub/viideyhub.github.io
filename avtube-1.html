<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Player</title>

<style>
body{
  margin:0;
  background:#000;
  font-family:Arial;
  color:#fff;
}

header{
  text-align:center;
  padding:10px;
  font-weight:bold;
}

video{
  width:100%;
  height:70vh;
  background:#000;
  object-fit:cover;
}

.info{
  text-align:center;
  font-size:13px;
  opacity:0.8;
  padding:8px;
}

.btn{
  background:#fff;
  color:#000;
  padding:12px;
  margin:10px;
  text-align:center;
  font-weight:bold;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>ViideyHub</header>

<video id="player" controls></video>

<div class="info">Enjoy Video</div>

<div class="btn" onclick="nextVideo()">NEXT VIDEO</div>

<script>
// =========================
// VIDEO
// =========================
document.getElementById("player").src =
"https://cdn.videy.co/Is6iuGSX1.mp4";

// =========================
// 🔥 DIRECTLINK → POPUNDER STYLE
// =========================

let triggered = false;
let engaged = false;
let startTime = Date.now();

const adLink = "https://omg10.com/4/10908814";

// detect user behavior
document.addEventListener("click", ()=> engaged = true);
player.addEventListener("play", ()=> engaged = true);
document.addEventListener("scroll", ()=> engaged = true);

// popunder style trigger (halus)
function tryPop(){
  if(triggered) return;

  let time = Date.now() - startTime;

  // syarat natural:
  // user aktif + sudah 10 detik
  if(engaged && time > 10000){
    triggered = true;

    setTimeout(()=>{
      window.open(adLink, "_blank"); // popunder style
    }, 1200);
  }
}

// trigger saat interaksi
document.addEventListener("click", tryPop);

// NEXT (forced natural popunder moment)
function nextVideo(){
  if(!triggered){
    triggered = true;
    window.open(adLink, "_blank");
  }

  window.location.href = "video-2.html";
}
</script>

</body>
</html>
