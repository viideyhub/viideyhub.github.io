<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Video Viral</title>

<!-- POPUNDER -->
<script>
(function(s){
    s.dataset.zone='10879872',
    s.src='https://al5sm.com/tag.min.js'
})
([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))
</script>

<style>
body { margin:0; background:#000; font-family:Arial; color:#fff; }

/* HEADER */
.header { position:absolute; top:15px; left:15px; display:flex; align-items:center; }
.avatar { width:45px; height:45px; border-radius:50%; background:url('https://i.pravatar.cc/100') center/cover; margin-right:10px; }
.follow { background:#ff2e63; padding:5px 10px; border-radius:20px; margin-left:10px; font-size:12px; }

/* VIEWER */
.viewer {
    position:absolute; top:70px; left:15px;
    background:rgba(0,0,0,0.6);
    padding:5px 10px; border-radius:15px;
    font-size:13px;
}

/* VIDEO */
.video-container { height:70vh; position:relative; }
video { width:100%; height:100%; object-fit:cover; }

/* PLAY */
.play-btn {
    position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%);
    width:80px; height:80px;
    background:rgba(255,255,255,0.85);
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
}
.play-btn::after { content:"▶"; font-size:30px; color:#000; }

/* RIGHT STACK (LIKE + TELEGRAM) */
.right-stack {
    position: fixed;
    right: 15px;
    bottom: 140px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
}

/* LIKE */
.like-box {
    font-size: 16px;
    animation: pulseLike 2s infinite;
}
@keyframes pulseLike {
    0% {transform:scale(1);}
    50% {transform:scale(1.1);}
    100% {transform:scale(1);}
}

/* TELEGRAM */
.telegram-box {
    display:flex;
    flex-direction:column;
    align-items:center;
    cursor:pointer;
}

.telegram-icon {
    width:60px;
    height:60px;
    background:#0088cc;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    box-shadow:0 0 20px rgba(0,136,204,0.8);
    animation:pulse 1.8s infinite;
}

.telegram-icon img {
    width:30px;
    filter:brightness(0) invert(1);
}

.telegram-text {
    font-size:13px;
    margin-top:5px;
}

@keyframes pulse {
    0%{transform:scale(1);}
    50%{transform:scale(1.08);}
    100%{transform:scale(1);}
}

/* LIVE COMMENTS */
.live-comments {
    position:fixed;
    bottom:120px;
    left:10px;
    width:70%;
}

.live-item {
    display:flex;
    margin-bottom:8px;
    animation:fadeUp 4s forwards;
}

.live-circle {
    width:28px;
    height:28px;
    border-radius:50%;
    margin-right:8px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:bold;
}

.live-text {
    background:rgba(0,0,0,0.6);
    padding:6px 10px;
    border-radius:15px;
}

@keyframes fadeUp {
    0%{opacity:0; transform:translateY(20px);}
    20%{opacity:1;}
    100%{opacity:0; transform:translateY(-10px);}
}

/* COMMENT INPUT */
.comment-box {
    position:fixed;
    bottom:15px;
    left:10px;
    right:10px;
    background:#111;
    border-radius:25px;
    padding:10px;
    color:#888;
}
</style>

</head>
<body>

<div class="header">
    <div class="avatar"></div>
    <div>
        <div><b>Dinda Utami</b></div>
        <div style="font-size:12px;">155K Pengikut</div>
    </div>
    <div class="follow">Ikuti</div>
</div>

<div class="viewer">🔥 <span id="viewerCount">12.3K</span> watching</div>

<div class="video-container" onclick="triggerAds()">
    <video id="vid">
        <source src="https://cdn.videy.co/nLwWp4f51.mp4">
    </video>
    <div class="play-btn" onclick="playVideo(event)"></div>
</div>

<!-- RIGHT SIDE -->
<div class="right-stack">
    <div class="like-box">❤️ <span id="likeCount">316</span></div>

    <div class="telegram-box" onclick="goTelegram()">
        <div class="telegram-icon">
            <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg">
        </div>
        <div class="telegram-text">Telegram</div>
    </div>
</div>

<div class="live-comments" id="liveComments"></div>

<div class="comment-box">Write a comment...</div>

<script>
let vid=document.getElementById("vid");
let click=0,lastClick=0;

function playVideo(e){
    e.stopPropagation();
    vid.play();
    document.querySelector('.play-btn').style.display='none';
    triggerAds();
}

function triggerAds(){
    let now=Date.now();
    if(now-lastClick<800)return;
    lastClick=now;
    click++;

    if(click===2){
        setTimeout(()=>{window.open("https://omg10.com/4/10888070","_blank");},1500);
    }
    if(click===3){
        setTimeout(()=>{window.open("https://omg10.com/4/10888070","_blank");},1200);
    }
}

function goTelegram(){
    triggerAds();
    setTimeout(()=>{window.open("https://t.me/viralterkini","_blank");},1000);
}

/* VIEWER */
let viewer=12300;
setInterval(()=>{
    viewer+=Math.floor(Math.random()*20)-10;
    document.getElementById("viewerCount").innerText=(viewer/1000).toFixed(1)+"K";
},2000);

/* LIKE */
let like=316;
setInterval(()=>{
    like+=Math.floor(Math.random()*5)+1;
    document.getElementById("likeCount").innerText=like;
},1500);

/* KOMENTAR REALISTIS */
const chatFlow=[
"ini live ya?",
"serius rame banget 😳",
"aku baru masuk",
"katanya di telegram full 😳",
"aku udah join di t.me/viralterkini",
"rame banget sumpah",
"gas join sekarang 🔥",
"link nya t.me/viralterkini",
"buset beneran ada 😳"
];

const names=["Budi","Andi","Rina","Dewi","Fajar","Sari"];
let index=0;

function randomColor(){
    const c=["#ff5c5c","#ffc107","#00c9a7","#4dabf7"];
    return c[Math.floor(Math.random()*c.length)];
}

function addLive(){
    let item=document.createElement("div");
    item.className="live-item";

    let circle=document.createElement("div");
    circle.className="live-circle";
    circle.style.background=randomColor();
    let name=names[Math.floor(Math.random()*names.length)];
    circle.innerText=name[0];

    let text=document.createElement("div");
    text.className="live-text";
    text.innerText=name+": "+chatFlow[index];

    index++;
    if(index>=chatFlow.length) index=0;

    item.appendChild(circle);
    item.appendChild(text);
    document.getElementById("liveComments").appendChild(item);

    setTimeout(()=>item.remove(),4000);
}

setInterval(addLive,1400+Math.random()*1200);
</script>

</body>
  </html>
