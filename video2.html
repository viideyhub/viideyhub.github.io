<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Live Sekarang 🔴</title>

<meta property="og:title" content="Live Sekarang 🔴">
<meta property="og:description" content="Sedang live sekarang, banyak yang nonton 🔥">
<meta property="og:image" content="https://via.placeholder.com/500x300">
<meta property="og:url" content="https://viideyhub.my.id">

<style>
body {
    margin:0;
    background:#000;
    font-family:Arial;
    color:#fff;
    overflow:hidden;
}

/* VIDEO */
.video-container {
    position:relative;
    height:100vh;
    background:#000;
}
video {
    width:100%;
    height:100%;
    object-fit:cover;
}

/* LIVE TOP */
.top {
    position:absolute;
    top:10px;
    left:10px;
    display:flex;
    gap:10px;
    align-items:center;
}

.live {
    background:red;
    padding:4px 10px;
    border-radius:5px;
    font-size:12px;
    font-weight:bold;
}

.viewer {
    background:rgba(0,0,0,0.6);
    padding:4px 10px;
    border-radius:20px;
    font-size:12px;
}

/* RIGHT ACTION */
.right {
    position:absolute;
    right:10px;
    bottom:120px;
    display:flex;
    flex-direction:column;
    gap:15px;
    align-items:center;
}

.icon {
    font-size:22px;
    cursor:pointer;
}

/* CTA */
.cta {
    position:absolute;
    bottom:80px;
    left:10px;
    right:10px;
    background:#ff2e63;
    padding:14px;
    border-radius:30px;
    text-align:center;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 0 10px rgba(255,46,99,0.6);
}

/* COMMENTS */
.comments {
    position:absolute;
    bottom:140px;
    left:10px;
    width:70%;
    font-size:13px;
}

.comment {
    margin-bottom:6px;
    background:rgba(0,0,0,0.5);
    padding:6px 10px;
    border-radius:10px;
    animation:fade 0.3s;
}

@keyframes fade {
    from {opacity:0; transform:translateY(10px);}
    to {opacity:1; transform:translateY(0);}
}

/* INPUT FAKE */
.input {
    position:absolute;
    bottom:20px;
    left:10px;
    right:10px;
    background:#111;
    padding:10px;
    border-radius:20px;
    color:#777;
    font-size:13px;
}
</style>
</head>

<body>

<div class="video-container">

<!-- VIDEO -->
<video autoplay muted loop playsinline>
    <source src="VIDEO_URL" type="video/mp4">
</video>

<!-- TOP -->
<div class="top">
    <div class="live">🔴 LIVE</div>
    <div class="viewer">🔥 <span id="viewer">12.3K</span></div>
</div>

<!-- RIGHT -->
<div class="right">
    <div class="icon">❤️</div>
    <div class="icon">💬</div>
    <div class="icon" onclick="go()">🔗</div>
</div>

<!-- CTA -->
<div class="cta" onclick="go()">
👉 Klik Untuk Akses Sekarang
</div>

<!-- COMMENTS -->
<div class="comments" id="comments"></div>

<!-- INPUT -->
<div class="input">Tulis komentar...</div>

</div>

<script>
function go(){
    window.open("LINK_CTA", "_blank");
}

/* VIEWER ANIMATION (SMOOTH) */
let v = 12300;
setInterval(()=>{
    v += Math.floor(Math.random()*30);
    document.getElementById("viewer").innerText = (v/1000).toFixed(1)+"K";
},2000);

/* COMMENTS REALISTIC */
const chat = [
"baru join 🔥",
"ini live asli?",
"rame banget 😳",
"gila sih ini",
"kok bisa rame gini",
"gas lanjut 🔥",
"wihh menarik"
];

function addComment(){
    let c = document.createElement("div");
    c.className = "comment";
    c.innerText = chat[Math.floor(Math.random()*chat.length)];
    document.getElementById("comments").appendChild(c);

    setTimeout(()=>c.remove(),5000);
}

setInterval(addComment,1200);
</script>

</body>
</html>
