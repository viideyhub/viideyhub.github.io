<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video</title>

<style>
body{
margin:0;
background:#0f0f0f;
font-family:Arial, sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:100%;
max-width:500px;
text-align:center;
padding:10px;
}

/* VIDEO */
video{
width:100%;
border-radius:12px;
background:black;
cursor:pointer;
}

/* TEXT */
.title{
margin-top:12px;
font-size:16px;
font-weight:bold;
color:white;
}

.desc{
margin-top:6px;
font-size:12px;
color:#aaa;
}

/* BUTTON */
.btn{
margin-top:12px;
display:inline-block;
padding:10px 15px;
background:#ff2d55;
color:white;
border:none;
border-radius:8px;
font-size:14px;
cursor:pointer;
text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

<!-- VIDEO (AUTO PLAY) -->
<video autoplay muted playsinline loop onclick="openLink()">
<source src="https://cdn2.videy.co/IWLlNAKZ1.mp4" type="video/mp4">
</video>

<!-- TEXT -->
<div class="title">🔥 Video Viral Terbaru</div>
<div class="desc">Klik video atau tombol untuk lanjut menonton</div>

<!-- BUTTON -->
<a class="btn" onclick="openLink()">▶ Lanjutkan</a>

</div>

<script>
// 🔥 DIRECT LINK
function openLink(){
window.open("https://omg10.com/4/10888070", "_blank");
}
</script>

</body>
</html>
