<!DOCTYPE html>

<head>

<style>
body{
margin:0;
font-family:Arial;
background:#fff;
}

.header{

justify-content:space-between;
padding:12px;
border-bottom:1px solid #eee;
}

.logo{
font-weight:bold;

}

.upload{

</head>

<body>

<!-- POPUNDER -->
<script>
(function(s){
s.dataset.zone='10879872',
s.src='https://al5sm.com/tag.min.js'
})
([document.documentElement, document.body]
.filter(Boolean)
.pop()
.appendChild(document.createElement('script')));
</script>

<div class="header">
  <div class="logo">viideyhub</div>
  <div class="upload">Upload</div>
</div>

</div>

<script>

let clicked = false;

function playVideo(){

// DIRECT LINK (halus + 1x)

clicked = true;

setTimeout(()=>{
