<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video System</title>

<style>
body{
  margin:0;
  background:#000;
  font-family:Arial;
  color:#fff;
}

header{
  text-align:center;
  padding:10px;
  font-weight:bold;
}

video{
  width:100%;
  height:65vh;
  background:#000;
  object-fit:cover;
}

.info{
  text-align:center;
  font-size:13px;
  opacity:0.8;
  padding:8px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
  padding:10px;
}

.card{
  background:#111;
  border-radius:8px;
  overflow:hidden;
  cursor:pointer;
  transition:0.2s;
}

.card:hover{
  transform:scale(1.03);
}

.card video{
  width:100%;
  height:110px;
  object-fit:cover;
}

.title{
  font-size:11px;
  text-align:center;
  padding:6px;
  opacity:0.8;
}
</style>
</head>

<body>

<header>ViideyHub</header>

<video id="player" controls></video>

<div class="info">🔥 Recommended for you</div>

<div class="grid" id="grid"></div>

<script>
// =====================
// VIDEO DATABASE
// =====================
const videos = [
  "https://cdn.videy.co/Is6iuGSX1.mp4",
  "https://cdn.videy.co/cIbSpy091.mp4",
  "https://cdn.videy.co/kA7kmjzY1.mp4",
  "https://cdn.videy.co/NwMmqnqf1.mp4"
];

let current = 0;
player.src = videos[current];

// =====================
// 🔥 RECOMMENDATION ENGINE
// =====================
function render(){
  let html = "";

  videos.forEach((v,i)=>{
    if(i !== current){
      html += `
        <div class="card" onclick="go(${i})">
          <video src="${v}" muted></video>
          <div class="title">Video ${i+1}</div>
        </div>
      `;
    }
  });

  grid.innerHTML = html;
}

// =====================
// CLICK TO CHANGE VIDEO
// =====================
function go(i){

  // 🔥 (optional revenue moment - halus)
  window.open("https://omg10.com/4/10908814", "_blank");

  current = i;
  player.src = videos[current];
  player.play();

  render();
}

render();
</script>

</body>
</html>
